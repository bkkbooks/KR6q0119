body:
  text: 內供奉沙門宗密答裴相國問裴休相國問禪法大行宗徒各異互相詆訿莫肯會同切要辨其源流知其深淺比雖留意未得分明撰錄之時恐有差錯伏望略為條流分別三五紙示及大抵列北宗南宗南宗中荷澤宗洪州牛頭等宗具言其淺深頓漸得失之要便為終身龜鏡也休再拜宗密禪師答然達磨所傳本無二法後隨人變故似殊途扄之即俱非會之即皆是前者所述傳記但論直下一宗若要辨諸宗師承須知有傍有正今且敘師資傍正然後述言教淺深自然見達磨之心流至荷澤矣牛頭宗者從四祖下傍出根本有慧融禪師者道性高簡神慧聦利先因多年窮究諸部般若之教已悟諸法本空迷情妄執後遇四祖印其所解空理然於空處顯示不空妙性故不俟久學而悟解洞明四祖語曰此法從上只委一人吾已付囑弟子弘忍訖即五祖也汝可別自建立後遂於牛頭山別建一宗當第一祖展轉乃至六代後第五祖師智威有弟子馬素素有弟子道欽即徑山是也此一宗都不關南北二宗其南北二宗自出於五祖門下五祖已前都未有南北之稱北宗者從五祖下傍出謂有神秀等一十人同是五祖忍大師弟子大師印許各堪為一方之師故時人云忍生十字能和尚直承其嫡非此十數也於中秀及老安智詵道德最著皆為高宗皇帝之所師敬子孫承嗣至今不絕就中秀弟子普寂化緣轉盛為二京法主三帝門師但稱達磨之宗亦不出南北之號南宗者即曹溪能大師受達磨言旨已來累代衣法相傳之本宗也後以神秀於北地大弘漸教對之故曰南宗承稟之由天下所知故不敘也後欲滅度以法印付囑荷澤令其傳嗣傳嗣之由先已敘之呈上然甚闕略今蒙審問更約承上祖宗傳記稍廣傳中敘能和尚處中間云有襄陽僧神會俗姓高年十四即荷澤也荷澤是傳法時所居之寺名來謁和尚和尚問知識遠來大艱辛將本來否答將來若有本即合識主答神會以無住為本見即是主大師云遮沙彌爭敢取次語便以杖亂打神會杖下思惟大善知識歷劫難逢今既得遇豈惜身命大師察其深悟情至故試之也如堯知舜歷試諸難傳末又云和尚將入涅槃默受密語於神會語云從上已來相承准的只付一人內傳法印以印自心外傳袈裟標定宗旨然我為此衣幾失身命數被北宗偷衣之事在此傳之前文今不能錄達磨大師懸記云至六代之後命如懸絲即汝是也此言在敘達磨傳中是以此衣宜留鎮山汝機緣在北即須過嶺二十年外當弘此法廣度眾生和尚臨終門人行滔超俗法海等問和尚法何所付和尚云所付囑者二十年外於北地弘揚又問誰人答云若欲知者大庾嶺上以網取之相傳云嶺上者高也荷澤姓高故密示耳荷澤宗者全是曹溪之法無別教旨為對洪州傍出故復標其宗號承稟之由已如上說然能和尚滅度後北宗漸教大行亦如上敘因成頓門弘傳之障曹溪傳授文已被磨換故二十年中宗教沉隱大師遭百種艱難等事皆如先所呈略傳廣在本傳他日具呈天寶初荷澤入洛大播斯門方顯秀門下師承是傍法門是漸既二宗雙行時人欲揀其異故標南北之名自此而始問既荷澤為第七祖何不立第八乃至九十後既不立何妨據傳衣為憑但止第六答若據真諦本絕名數一猶不存何言六七今約俗諦師資相傳順世之法有其所表如國立七廟七月而葬喪服七代福資七祖道釋皆同經說七佛持念遍數壇場物色作法方便禮佛遠佛請僧之限皆止於七過則二七乃至七七不止於六不至八九今傳受儀式順世生信何所疑焉故德宗皇帝貞元十二年勅皇太子集諸禪師楷定禪門宗旨搜求傳法傍正遂有勑下立荷澤大師為第七祖內神龍寺見有銘記又御製七代祖師讚文見行於世洪州宗者先即六祖下傍出謂有禪師姓馬名道一先是劒南金和尚弟子也金之宗源即智詵也亦非南北高節至道遊方頭陀隨處坐禪乃至南嶽遇讓禪師論量宗教理不及讓方知傳衣付法曹溪為嫡乃迴心遵稟便住處州洪州或山或郭廣開供養接引道流後於洪州開元寺弘傳讓之言旨故時人號為洪州宗也讓即曹溪門下傍出之派徒曹溪此類數可千餘是荷澤之同學但自率身修行本不開法因馬和尚大揚其教故成一宗之源右且略敘諸宗師承大槩如此然緣傍正橫竪交雜難記今𦘕出為圖冀一覧不遺於心腑謹連次後上已敘諸宗師資今次辨所傳言教深淺得失然禪門之旨在乎內照非筆可述非言可宣言雖不及猶可強言筆不可及直難下筆今不得已而書望照之於心無滯於文矣然達磨西來唯傳心法故自云我法以心傳心不立文字此心是一切眾生清淨本覺亦名佛性或云靈覺迷起一切煩惱煩惱亦不離此心悟起無邊妙用妙用亦不離此心妙用煩惱功過雖殊在悟在迷此心不異欲求佛道須悟此心故歷代祖宗唯傳此也然若感應相契則雖一燈傳百千燈而燈燈無殊若機教不投則雖一音演說法而各各隨所解故諸宗異說過在後人今且各敘諸宗然始判其差當北宗意者眾生本有覺性如鏡有明性煩惱覆之不見如鏡有塵闇若依師言教息滅妄念念盡則心性覺悟無所不知如磨拂昏塵塵盡則鏡體明淨無所不照故彼宗主神秀大師呈五祖偈云身是菩提樹心如明鏡臺時時須拂拭莫遣有塵埃評曰此但是染淨緣起之相反流背習之門而不覺妄念本空心性本淨悟既未徹修豈稱真劒南復有淨眾宗旨與此大同復有保唐宗所解似同所修全異不可繁敘他日面奉一一辨之洪州意者起心動念彈指動目所作所為皆是佛性全體之用更無別用全體貪嗔癡造善造惡受樂受苦此皆是佛性如作種種飲食一一皆意以推求此身四大骨肉喉舌牙齒眼耳手足並不能自語言見聞動作如一念命終全身都未變壞即便口不能語眼不能見耳不能聞脚不能行手不能作故知能言語動作者必是佛性且四大骨肉一一細推都不解貪嗔煩惱故知貪嗔煩惱並是佛性佛性體非一切差引種種而能造作一切差別種種體非種種者謂此佛性非聖非凡非因非果非善非惡無色無相無根無住乃至無佛無眾生也能作種種者謂此性即體之用故能凡能聖能因能根能善能惡現色現相能佛能眾生乃至能貪嗔等若覈其體性則畢竟不可見不可證如眼不自見眼等若就其應用即舉動運為一切皆是更無別法而為能證所證彼意准楞伽經云如來藏是善不善因能遍興造一切趣生受苦樂與因俱又佛語心經云或有佛剎揚眉動睛笑吹謦欬或動搖等皆是佛事既悟解之理一切天真自然故所修行理宜順此而乃不起心斷惡亦不起心修道道即是心不可將心還修於心惡亦是心不可將心還斷於心不斷不造任運自在名為解脫人無法可拘無佛可作猶如虗空不增不減何假添補何以故心性之外更無一法可得故故但任心即為修也評曰此與前宗敵體相返前則朝暮分別動作一切皆妄此則朝暮分別動作一切皆真奉問疑其互相詆訿暮肯會同且所見如此相違爭不詆訿若存他則失己爭肯會同牛頭宗意者體諸法如夢本來無事心境本寂非今始空迷之為有即見榮枯貴賤等事事跡既有相違相順故生愛惡等情情生則諸苦所繫夢作夢受何損何益有此能了之智亦如夢心乃至設有一法過於涅槃亦如夢如幻既達本來無事理宜喪己忘情情妄即絕苦因方度一切苦厄此以忘情為修也評曰前以念念全真為悟任心為修此以本無事為悟妄情為修又上三家見解異者初一切皆妄次一切皆真後一切皆無若就行說者初伏心滅妄次信任情性後休心不起宗密性好勘會一一曾參各搜得旨趣如是若將此語問彼學人即皆不招承問有答空徵空認有或言俱非或言皆不可得修不修等皆類此也彼意者常恐墮於文字常怕滯於所得故隨言拂也有歸心學者方委細教授令多時觀照熟其行解矣然每宗復有多種方便拒於外難誘於徒屬不可具書今但羅其意趣舉其宏綱也荷澤宗者尤難言述是釋迦降出達磨遠來之本意也將前望此此乃逈異於前將此攝前前即全同於此故難言也今強言之謂諸法如夢諸聖同說故妄念本寂塵境本空空寂之心靈知不昧即此空寂寂知是前達磨所傳空寂心也任迷任悟心本自知不藉緣生不因境起迷時煩惱亦知非煩惱悟時神變亦知知非神變然知之一字眾妙之源由迷此知即起我相計我我所愛惡自生隨愛惡心即為善惡善惡之報受六道形世世生生循環不絕若得善友開示頓悟空寂之知知且無念無形誰為我相人相覺諸相空真心無念念起即覺覺之即無修行妙門唯在此也故雖備修萬行唯以無念為宗但得無念之心則愛惡自然淡薄悲智自然增明罪業自然斷除功行自然精進於解則見諸相非相於行則名無修之修煩惱盡時生死即絕生滅滅已寂照現前應用無窮名之為佛上已各敘一宗今辨明深淺得失然心貫萬法義味無邊諸教開張禪宗撮略撮略者就法有不變隨緣二義就人有頓悟漸修兩門二義顯即知一藏經論之旨歸兩門開則見一切賢聖之軌轍達磨深意實在斯焉不變隨緣者然象外之理直說難證今以喻為衡鏡定諸宗之是非便隨喻以法合之隨文以注對之冀法喻一一相照易見也然初覽時但請且一向讀喻辨本末了然後却再以注文對辨其理如一摩尼珠一靈心也唯圓淨明空寂知也都無一切差別色相此知本無一切分別亦無聖凡善惡以體明故對外物時能現一切差別色相以體知故對諸緣時能分別一切是非好惡乃至經營造作世出世間種種事數此是隨緣義也色相自有差別明珠不曾變易愚智善惡自有差別憂喜愛憎自有起滅能知之心不曾間斷此是不變義也然珠所現色雖百千般今且取與明珠相違者之黑色以況靈明知見與黑暗無明雖即相違而是一體法喻已具謂如珠現黑色時徹體全黑都不見明靈知之心在凡夫時全是迷愚貪愛都不見如來知見大圓鏡智故經云身心等相皆是無明也如癡孩子或村野人見之直是黑珠迷人但見定見凡夫有人語云此是明珠灼然不信却嗔前人謂為欺誑任說種種道理終不聽覧宗密頻遇如此之類向道汝今了了能知見是佛心灼然不信却云此是誘三婆二婦之言直不肯照察但言某乙鈍根實不能入此是大小乘法相及人天教中着相之人意見如此縱有肯信是明珠者緣自覩其黑亦謂言被黑色纏裹覆障擬待磨拭揩洗去却黑暗方得明相出現始名親見明珠北宗見解如此復有一類人指示云即此黑暗便是明珠明珠之體永不可見欲得識者即黑便是明珠乃至即青黃種種皆是致令愚者的信此言專記黑相或認種種相為明珠或於異時見黑梙子珠米吹青珠碧珠乃至赤珠琥珀白石英等珠皆云是摩尼或於異時是摩尼珠都不對色時但有明淨之相却不認之以不見有諸色可識認故疑恐局於一明珠相故洪州見解如此也言愚者彼宗後學也異時見黑梙子等者心涉世間分別塵境時見貪嗔愛慢之念也琥珀石英者如慈善謙敬之念也不對色時者無所念也但有明淨者了了自知無念也疑局者彼之唯認知是偏局也復有一類人聞說珠中種種色皆是虗妄徹體全空即計此一顆明珠都是其空便云都無所得方是達人認有一法便是未了不悟色相皆空之處乃是不空之珠牛頭見解如此也聞說空等者諸部般若說空之經也計此一顆等者計本覺性亦空無有所認認有等者聞說諸法空寂之處了了能知是本覺真心却云不了不知心體不空不空者涅槃經說如瓶空者謂瓶中無物名為瓶空非謂無瓶言無者心之中無分別貪嗔等念名為心空非謂無心言無者但為遣却心中煩惱也故知牛頭但遣其非未顯其是從此下皆喻荷澤意何如直云唯瑩淨圓明方是珠體唯空寂知也若但說空寂而不顯知即何異虗空亦如圓顆瑩淨之瓷團雖圓淨而無明性何名摩尼何能現影洪州牛頭但說無一物不顯靈知亦如此也其黑色乃至一切青黃色等悉是虗妄善惡分別舉動運為如洪州所認起心動念等即是一切相此相皆妄故經云凡所有相皆是虛妄當知彼宗認虗妄為真性也正見黑色時黑元不黑但是其明青元不青但是其明乃至赤白黃等一切皆然但是其明既即於諸色相處一一但見瑩淨圓明即於珠不惑一切皆空唯心不變迷時亦知知元不迷念起亦知知元無念乃至哀樂喜怒愛惡一一皆知知元空寂空寂而知即於心性了然不惑此上皆逈異諸宗也故初標云將前望此此即逈異於前但於珠不惑則黑既無黑黑即是明珠諸色皆爾即是有無自在明黑融通復何礙哉此同彼二宗也黑即無黑同牛頭牛頭但云一切皆無黑即是珠已下同洪州洪州云一切皆是佛性凡聖善惡皆無所礙故初標但云將此攝前前即是全同於此自此已下喻意再將荷澤本宗結束三宗也若認得明珠是能現之體永無變易荷澤但云黑是珠洪州宗或擬離黑覔珠北宗或言明黑都無者牛頭宗皆是未見珠也都結問據大乘經及古今諸宗禪門乃至荷澤所說理性皆同云無生無滅無為無相無聖無凡無是無非不可證不可說今但依此即是何必要須說靈知耶答此並是遮遣之詞未為顯示心體若不指示現今了了常知不昧是自心者說何為無為無相等耶是知諸教只說此知無生滅等也故荷澤於空無相處指示知見令人認得便覺自心經生越世永無間斷乃至成佛也荷澤又収束無為無住乃至不可說等種種之言但云空寂知一切攝盡空者空却諸相猶是遮遣之言唯寂是實性不變動義不同空無也知是當體表顯義不同分別也唯此方為真心本體故始自發心乃至成佛唯寂唯知不變不斷但隨地位名義稍殊謂約了悟時名為理智理即寂也智即知也約發心修行時名為止觀止息塵緣契於寂也觀照性相冥於知也約任運成行多為定慧因止緣而心定定者寂然不變因觀照而發慧慧者知無分別也約煩惱都盡功行圓滿成佛之時名為菩提涅槃菩提梵語此翻為覺即是知也涅槃梵語此翻為寂滅即是寂也當知始自發心乃至畢意唯寂唯知也若如二宗但言空寂無為等者則闕菩提義也問洪州亦云靈覺及鑒照等何異於知答若據多義以顯一體即萬法皆是一心何唯靈覺鑒照等今就尅體指示即愚智善惡乃至禽畜心性皆然了了常知異於木石其覺智等言即不通一切謂迷者不覺愚者無智心無記時即不名鑒照等豈同心體自然常知故花嚴疏主答順宗云無住心體靈知不昧又云任運寂知又云雙照寂知華嚴經亦揀知與智別況洪州雖云靈覺但是標眾生有之如云皆有佛性之言非的指示指示則但云能言語等若細詰之即云一切假名無有定法且統論佛教有遣顯二門推其實義有真空妙有空其本心具體具用今洪州牛頭以拂跡為至極但得遣教之意真空之義唯成其體失於顯教之意妙有之義闕其用也問洪州以能語言動作等顯於心性即當顯教即是其用何所闕耶答真心本體有二種用一者自性本用二者隨緣應用猶如銅鏡銅之質是自性體銅之明是自性用明所現影是隨緣用影即對緣方現現有千差明即自性常明明唯一味以喻心常寂是自性體心常知是自性用此能語言能分別動作等是隨緣應用今洪州指示能語言等但是隨緣用闕自性用也又顯教有比量顯現量顯洪州云心體不可指示但以能語言等驗之知有佛性是比量顯也荷澤直云心體能知知即是心約知以顯心是現量顯也洪州闕此已上述不變隨緣二義今次明頓悟漸修兩門者然真如之理尚無佛無眾生況有師資傳授今既自佛已來祖祖傳授即知約人修證趣入之門也既就人論即有迷悟始終凡聖從迷而悟即頓轉凡成聖即頓悟也頓悟者謂無始迷倒認此四大為身妄想為心通認為我若遇善友為說如上不變隨緣性相體用之義忽悟靈靈知見是自真心心本空寂無邊無相即是法身身心不二是為真我即與諸佛分毫不殊故云頓也此下舉喻便隨文注以法合之如有大官佛性夢迷也在牢獄三界身本識著枷鏁貪愛種種憂苦一切業報百計求出問法勤修遇人喚起善知識也忽然覺悟聞法心開方見自身法身真我元在自家淨名經云畢竟空寂舍也安樂寂滅為樂富貴體上本有河沙功德也與諸朝寮都無別異同諸佛之真性法合一一如注可知據此法喻一一分明足辨夢悟身心本源雖一論其相用倒正懸殊不可覺來還作夢事以喻心源雖一迷悟懸殊夢時拜相迷時修得大梵天王等位不及覺時作尉悟後初入十信位也夢得七寶迷詩修無量功德也不及覺時百錢悟時持五戒十善皆以一妄一真故不可類諸教皆云施三千七寶不如聞一句偈是此意也今洪州但言貪嗔戒定一種是佛性作用者闕於揀辨迷悟倒正之用也彼意在真如心性常知如不變之濕性心既無迷即非無明如風頓止悟後自然攀緣漸息如波浪漸停以定慧資薰身心漸漸自在乃至神變無礙普利群生如春陽氷泮溉灌洗滌善利萬物也洪州常云貪嗔慈善皆是佛性有何別者如人但觀濕性始終無異不知濟舟覆舟功過懸殊故彼宗於頓悟門雖近而未的於漸修門有誤而全垂牛頭以達空故於頓悟門而半了以忘情故於漸修門而無虧北宗但是漸修全無頓悟無頓悟故修亦非真荷澤則必先頓悟依悟而修故經云若諸菩薩悟淨圓覺悟也以淨覺心取靜為行由澄諸念覺識煩動等修也此頓悟漸修之意備於一藏大乘而起信圓覺華嚴是其宗也若約各為一類之機善巧方便廣開門戶各各誘引熏生生之習種為世世之勝緣則諸宗所說亦皆是諸佛之教也諸經諸論具有其文矣去明治四十三年十二月續藏經編集長中野達慧師曰此書者希代之書而於他家無所藏請謄寫之以編入續藏辰乃速應請求許謄寫且記其事實以授焉于時明治四十有四年一月吉旦四海唱道五十四傳燈沙門靜照日辰謹識於日蓮宗大本山妙顯精舍方丈
